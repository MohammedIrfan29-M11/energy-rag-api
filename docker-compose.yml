version: "3.9"

services:
  api:
    build: .
    container_name: energy-rag-api
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./documents:/app/documents
      - ./chroma_db:/app/chroma_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s